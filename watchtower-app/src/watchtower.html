        <style>
            :root {
                --Base03: #1b1b1b; /* background tones (dark) */
                --Base02: #242424; /* -- */
                --Base01: #666666; /* content tones */
                --Base00: #747474; /* -- */
                --Base0: #8c8c8c;  /* -- */
                --Base1: #9a9a9a;  /* -- */
                --Base2: #eee8d5;  /* background tones (white) */
                --Base3: #fdf6e3;  /* -- */
                --Yellow: #b58900; /* accent tones */
                --Orange: #cb4b16;
                --Red: #dc322f;
                --Magenta: #d33682;
                --Violet: #6c71c4;
                --Blue: #268bd2;
                --Cyan: #2aa198;
                --Green: #859900;
                --Black: #000;
                --bg-color: var(--Base2);
                --bg-color-darker: var(--Base3);
                --text-color: var(--Base03);
                --text-color-darker: var(--Base00);
                --border-color: var(--Base1);
                --shadow-color: var(--Base1);
                --separator-color: var(--Base1);
                --Gray: var(--Base1);
                --tooltip-bg-color: var(--Base02);
                --tooltip-text-color: var(--Base2);
            }
            [data-theme='dark'] {
                --bg-color: var(--Base03);
                --bg-color-darker: var(--Base02);
                --text-color: var(--Base3);
                --text-color-darker: var(--Base1);
                --border-color: var(--Base01);
                --shadow-color: #0f0f0f;
                --separator-color: var(--Base01);
                --Gray: var(--Base01);
                --tooltip-bg-color: var(--Base2);
                --tooltip-text-color: var(--Base02);
            }
            *, *::before, *::after { box-sizing: border-box }
            * { margin: 0 }
            html { height: 100%; -webkit-text-size-adjust: 100%; scrollbar-width:thin }
            body {
                display: block;
                min-height: 100%;
                box-sizing: border-box;
                margin: 0;
                padding: 5px;
                font: 0.85rem sans-serif;
                background-color: var(--bg-color);
                color: var(--text-color);
                cursor: default;
                display: block;
                overflow-x: hidden;
            }
            body.embedded {
                background-color: transparent;
                padding: 0;
                position: relative;
                inset: -5px;
                width: calc(100vw + 9px);
                overflow: hidden;
            }
            a { text-decoration: none; color: var(--Blue) }

            /* CSS spinner */
            .spinner:after {
                position: absolute;
                top: calc(50% - 32px);
                left: calc(50% - 32px);
                content: ' ';
                display: block;
                width: 64px;
                height: 64px;
                border-radius: 50%;
                border: 1px solid var(--text-color-darker);
                border-color: var(--text-color-darker) transparent var(--text-color-darker) transparent;
                animation: spinner 1.2s linear infinite;
            }
            @keyframes spinner {
                0% { transform: rotate(0deg) }
                100% { transform: rotate(360deg) }
            }

            /* App */
            #app {
                display: block;
                height: calc(100vh - 10px);
            }

            #grid .grid-stack { min-height: 100% }
            #grid .grid-stack-item {
                container-name: grid-stack-item;
                container-type: size;
            }
            #grid .grid-stack-item-content {
                box-sizing: border-box;
                background-color: var(--bg-color-darker);
                color: var(--text-color);
                border: 0;
                border-radius: 5px;
                box-shadow: 0 0 4px rgba(0, 0, 0, 0.1);
                border: 1px transparent solid;
                overflow: hidden;
            }
            #grid .grid-stack-item-content:hover {
                border-color: var(--border-color);
            }
            #grid .grid-stack-item[gs-id^="tr-"] .grid-stack-item-content {
                border: none;
                box-shadow: none;
                overflow: hidden;
            }
            #grid .panel-container {
                width: 100%;
                height: 100%;
                position: relative;
            }
            #grid .grid-stack-item[gs-id^="tr-"] .grid-stack-item-content {
                background-color: transparent;
            }
            #grid .panel-title {
                position: absolute;
                top: 0;
                left: 50%;
                transform: translate(-50%, 0);
                background-color: transparent;
                color: var(--text-color-darker);
                text-align: center;
                padding: 0.2em 1em 0.2em 1em;
                overflow: hidden;
                white-space: nowrap;
                text-overflow: ellipsis;
                user-select: none;
            }
            #grid .grid-stack:not([mobile-view]) .panel-container:hover .panel-title {
                cursor: move;
                background-color: var(--bg-color);
                color: var(--text-color);
                box-shadow: 0 0 5px rgba(0, 0, 0, 0.3);
                border: 1px var(--border-color) solid;
                border-radius: 0 0 5px 5px;
                border-top: 0;
            }
            #grid .grid-stack-item-removing .panel-container {
                background-color: rgba(255, 0, 0, 0.3);
            }

            /* Grid Panel */
            .panel {
                display: block;
                width: 100%;
                height: 100%;
            }
            .panel canvas {
                width: 100%;
                height: 100%;
                touch-action: pan-y;
            }
            .panel.empty canvas { visibility: hidden }
            precision-selector {
                position: absolute;
                bottom: 0;
                left: 50%;
                transform: translate(-50%, 0);
                visibility: hidden;
            }
            .panel:hover precision-selector,
            .panel:hover nav {
                visibility: visible;
            }
            .panel aside {
                position: absolute;
                top: 50%;
                left: 0;
                transform: translate(0, -50%);
                display: block;
                color: var(--text-color-darker);
                width: 100%;
                text-align: center;
            }
            .panel .reset-zoom {
                position: absolute;
                top: 0px;
                right: 0px;
                border: none;
                background-color: var(--Blue);
                color: var(--Base3);
                border-radius: 0 0 0 5px;
                padding: 5px 10px;
                line-height: 1rem;
                z-index: 100;
                cursor: pointer;
                letter-spacing: 1px;
            }
            .panel nav {
                position: absolute;
                top: 0px; left: 2px;
                cursor: pointer;
                visibility: hidden;
            }

            /* Stat panel */
            .stats-container {
                display: flex;
                gap: 10px;
                margin: 0;
                padding: 0;
                list-style: none;
                width: 100%;
                height: 100%;
            }
            @container grid-stack-item (max-aspect-ratio: 1/1) {
                .stats-container {
                    flex-direction: column;
                }
                #grid .grid-stack-item-content:has(.bg-Yellow) { background-color: var(--Yellow) }
                #grid .grid-stack-item-content:has(.bg-Orange) { background-color: var(--Orange) }
                #grid .grid-stack-item-content:has(.bg-Red) { background-color: var(--Red) }
                #grid .grid-stack-item-content:has(.bg-Magenta) { background-color: var(--Magenta) }
                #grid .grid-stack-item-content:has(.bg-Violet) { background-color: var(--Violet) }
                #grid .grid-stack-item-content:has(.bg-Blue) { background-color: var(--Blue) }
                #grid .grid-stack-item-content:has(.bg-Cyan) { background-color: var(--Cyan) }
                #grid .grid-stack-item-content:has(.bg-Green) { background-color: var(--Green) }
                #grid .grid-stack-item-content {
                    box-shadow: inset 30px 0 50px #FFFFFF15, inset -30px 0 30px #FFFFFF15;
                }
                [data-theme='dark'] #grid .grid-stack-item-content {
                    box-shadow: inset 30px 0 50px #00000015, inset -30px 0 30px #00000015;
                }
            }
            @container grid-stack-item (min-aspect-ratio: 1/1) {
                #grid .grid-stack-item-content:has(stats-panel) {
                    background-color: transparent;
                    box-shadow: none;
                }
                .stats-container > li {
                    background-color: var(--bg-color-darker);
                    box-shadow: 0 0 4px rgba(0, 0, 0, 0.1);
                }
                .stats-container.bg-Yellow > li { background-color: var(--Yellow) }
                .stats-container.bg-Orange > li { background-color: var(--Orange) }
                .stats-container.bg-Red > li { background-color: var(--Red) }
                .stats-container.bg-Magenta > li { background-color: var(--Magenta) }
                .stats-container.bg-Violet > li { background-color: var(--Violet) }
                .stats-container.bg-Blue > li { background-color: var(--Blue) }
                .stats-container.bg-Cyan > li { background-color: var(--Cyan) }
                .stats-container.bg-Green > li { background-color: var(--Green) }
                .stats-container.has-bg > li {
                    color: white;
                    box-shadow: inset 30px 0 50px #FFFFFF15, inset -30px 0 30px #FFFFFF15;
                }
                [data-theme='dark'] .stats-container.has-bg > li {
                    box-shadow: inset 30px 0 50px #00000015, inset -30px 0 30px #00000015;
                }
            }
            .stats-container > li {
                flex: 1 1 0;
                display: flex;
                flex-direction: column;
                overflow: auto;
                border-radius: 5px;
                position: relative;
                margin: -1px;
            }
            .stats-container.has-bg > li {
                color: white;
            }
            .stats-container > li > article {
                flex: 2 1 0;
                overflow: hidden;
                container-type: size;
            }
            .stats-container > li > article > div {
                position: absolute;
                top: 50%;
                left: 50%;
                width: 100%;
                transform: translate3d(-50%, -50%, 0);
                font-size: min(20cqw, 40cqh);
            }
            .stats-container > li > article > header {
                padding-top: 3px !important;
            }
            .stats-container > li > article > header,
            .stats-container > li > article > div > * {
                text-align: center;
                padding: 0 .2em;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            .stats-container > li > article > div > small {
                display: block;
                font-size: 40%;
            }
            .stats-container > li > article > div > b {
                display: block;
                font-weight: normal;
            }
            .stats-container > li > article > div > b > span {
                opacity: .7;
                font-size: 80%;
                padding-left: 3px;
                font-stretch: condensed;
                letter-spacing: -0.03em;
            }
            .stats-container > li > output {
                flex: 1 1 0;
                position: relative;
                overflow: auto;
                margin-bottom: 0;
            }

            /* Menu */
            #menu {
                display: block;
                position: fixed;
                top: 0;
                left: 0;
                height: 100%;
            }
            #menu nav {
                box-sizing: border-box;
                position: absolute;
                top: 0;
                left: -15em;
                width: 15em;
                height: 100%;
                padding: 1em;
                background-color: var(--bg-color-darker);
                color: var(--text-color);
                border-right: 1px var(--border-color) solid;
                animation: hidemenu .3s;
            }
            #menu[open] nav {
                box-shadow: 0 0 1em var(--shadow-color);
                left: 0;
                animation: showmenu .3s;
            }
            @keyframes hidemenu {
                from { left: 0 }
                to { left: -15em }
            }
            @keyframes showmenu {
                from { left: -15em }
                to { left: 0px }
            }
            #menu hr {
                border: 0;
                border-top: 1px var(--separator-color) solid;
                margin: 1em 0;
            }
            #menu button {
                background-color: var(--bg-color);
                color: var(--text-color);
                border: 1px var(--border-color) solid;
                border-radius: 5px;
                margin-bottom: 5px;
                padding: .5em 1em;
                cursor: pointer;
                display: block;
                width: 100%;
                text-align: left;
                box-shadow: 0 0 0.3em var(--shadow-color);
            }
            #menu button:hover {
                background-color: var(--Blue);
                color: var(--Base3);
            }
            #menu label {
                display: block;
                margin: 1em 0 .5em 0;
                font-size: .85rem;
            }
            #menu select {
                display: block;
                width: 100%;
                margin-bottom: 5px;
                height: 30px;
                background-color: var(--bg-color-darker);
                color: var(--text-color);
                border: 1px var(--border-color) solid;
                border-radius: 5px;
            }
            #menu select:focus, button:focus {
                outline: 1px var(--Blue) solid;
                border-color: var(--Blue);
            }
            #menu aside {
                color: var(--text-color-darker);
                position: absolute;
                bottom: .5em;
                left: 50%;
                transform: translateX(-50%);
                user-select: none;
                font-size: .75rem;
            }
            #menu form {
                border: 1px solid grey;
                padding: 0;
                background-color: var(--bg-color-darker);
                color: var(--text-color);
                border: 1px var(--border-color) solid;
                border-radius: 5px;
                position: relative;
                display: block;
                width: 100%;
            }
            #menu form input[type="text"] {
                box-sizing: border-box;
                border: none;
                color: var(--text-color);
                background-color: transparent;
                padding-right: 30px;
                padding-left: 5px;
                width: 100%;
                height: 28px;
            }
            #menu form input:focus {
                outline: none;
            }
            #menu form:focus-within {
                border-color: var(--Blue);
                outline: 1px solid var(--Blue); 
            }
            #menu form:invalid {
                border-color: var(--Red);
                outline: 1px solid var(--Red);
            }
            #menu form input[type="submit"] {
                border: none;
                color: var(--text-color-darker);
                background-color: transparent;
                position: absolute;
                top: 50%;
                right: 0px;
                transform: translateY(-50%);
                cursor: pointer;
                width: 30px;
            }

            /* Add dialog */
            #add-dialog {
                display: none;
                position: fixed;
                width: 100%; height: 100%;
                top: 0; left: 0;
                background-color: rgba(0, 0, 0, 0.3);
                font-size: 0.84rem;
            }
            #add-dialog[open="true"] {
                display: block;
            }
            #add-dialog article {
                min-width: 400px;
                box-sizing: border-box;
                display: block;
                position: absolute;
                top: -50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background-color: var(--bg-color-darker);
                color: var(--text-color);
                border: 1px var(--border-color) solid;
                box-shadow: 0 0 1em var(--shadow-color);
                border-radius: 5px;
                padding: 0;
            }
            @media only screen and (max-width: 768px) {
                #add-dialog article {
                    min-width: calc(100% - 10px);
                    width: calc(100% - 10px);
                }
            }
            #add-dialog[open="true"] article {
                animation: showme .5s;
                animation-fill-mode: forwards;
            }
            @keyframes showme {
                to { top: 50% }
            }
            #add-dialog header {
                text-align: center;
                font-weight: bold;
                padding: 1em;
            }
            #add-dialog section.modal-body {
                max-height: 70vh;
                overflow-y: auto;
                padding: 0 1em;
            }
            #add-dialog section.modal-body fieldset {
                border: 0;
                border-radius: 5px;
                background-color: var(--bg-color);
                padding: 10px;
            }
            #add-dialog section.modal-body fieldset:not(:last-child) {
                margin-bottom: 10px;
            }
            #add-dialog section.modal-body fieldset nav {
                text-align: right;
                border-top: 1px var(--border-color) solid;
                margin-top: 5px;
                padding-top: 5px;
                color: var(--border-color);
            }
            #add-dialog section.modal-body fieldset a {
                color: var(--Blue);
                text-decoration: none;
            }
            #add-dialog fieldset section:not(:last-child) {
                margin-bottom: 10px;
            }
            #add-dialog section.modal-body section > div {
                margin-top: .3em;
            }
            #add-dialog footer {
                padding: 1em;
                text-align: right;
            }
            #add-dialog footer button[type="button"] {
                float: left;
            }
            #add-dialog button {
                padding: .5em 1em;
                cursor: pointer;
                background-color: var(--bg-color);
                color: var(--text-color);
                border: 1px var(--border-color) solid;
                border-radius: 5px;
                box-shadow: 0 0 0.3em var(--shadow-color);
            }
            #add-dialog button:not(:first-child) {
                margin-left: 10px;
            }
            #add-dialog button:hover {
                background-color: var(--Blue);
                color: var(--Base3);
            }
            #add-dialog label { display: block; user-select: none; margin-bottom: 5px }
            #add-dialog select { display: block; line-height: 32px }
            #add-dialog input, select, textarea {
                box-sizing: border-box;
                display: block;
                width: 100%;
                height: 32px;
                background-color: var(--bg-color-darker);
                color: var(--text-color);
                border: 1px var(--border-color) solid;
                border-radius: 5px;
                padding: 6px;
                margin: 0;
            }
            #add-dialog textarea { width:100%; min-height: 180px; margin-bottom: 5px }
            #add-dialog .checkbox:not(:last-child) { margin-bottom: 9px }
            #add-dialog .checkbox input { display: none }
            #add-dialog .checkbox label {
                align-items: center;
                cursor: pointer;
                display: flex;
                line-height: 15px;
                height: 15px;
                position: relative;
                margin-bottom: 0;
            }
            #add-dialog .checkbox label::before, .checkbox label::after { content: ''; display: block }
            #add-dialog .checkbox label::before {
                background-color: var(--Base00);
                border-radius: 500px;
                height: 15px;
                margin-right: 8px;
                width: 25px;
            }
            #add-dialog .checkbox input:user-invalid + label::before { background-color: var(--Red) }
            #add-dialog .checkbox label::after {
                background-color: #fff;
                border-radius: 13px;
                height: 13px;
                left: 1px;
                position: absolute;
                top: 1px;
                transition: transform 0.125s ease-out;
                width: 13px;
            }
            #add-dialog .checkbox input:checked + label::before { background-color: var(--Blue) }
            #add-dialog .checkbox input:checked + label::after { transform: translate3d(10px, 0, 0) }
            #add-dialog input:focus, select:focus, textarea:focus, button:focus {
                outline: 1px var(--Blue) solid;
                border-color: var(--Blue)
            }
            #add-dialog input:user-invalid, select:user-invalid, textarea:user-invalid {
                border-color: var(--Red) !important;
            }
            #add-dialog aside {
                display: block;
                position: relative;
                background-color: var(--bg-color);
                color: var(--text-color-darker);
                border: 1px var(--border-color) solid;
                padding: .5em .5em .5em 2.3em;
            }
            
            /* Sortable list */
            #add-dialog .empty { display: none }
            #add-dialog .grid-stack {
                margin: 0 !important;
                padding: 0 !important;
            }
            #add-dialog .grid-stack-item-content {
                width: 100%;
                height: 100%;
                display: flex;
                align-items: center;
                user-select: none;
                inset: 0;
            }
            #add-dialog .item-text {
                flex: 1;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            #add-dialog .item-move {
                cursor: move;
                padding-right: 5px;
            }
            #add-dialog .item-remove {
                margin-left: auto;
                cursor: pointer;
                padding-left: 5px;
            }
        </style>
        <script>window.litDisableBundleWarning = true</script>
        <script type="module" src="watchtower.js?access_token=${access_token}"></script>
    </head>
    <body class="spinner">
        <watchtower-app id="app"></watchtower-app>
    </body>
</html>
